<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="style.css" rel="stylesheet" />
    <title>Pharma Zen</title>
</head>
<body>

            <img src="assets/images/logo.png" />

    <div class="hero">
        <img src="assets/images/hero.png">
    </div>
    <div class="container">
        <div class="content">
            <img src="assets/images/usar-mascara.png">
            <h1>USE MASCARA</h1>
            <p>Usar a máscara previne a ploriferação do vírus.</p>
        </div>
        <div class="content">
            <img src="assets/images/lavar-as-maos.png">
            <h1>LAVE AS MÃOS</h1>
            <p>Lavar as mãos corretamente, impede que você plorifere o vírus.</p>
        </div>
        <div class="content">
            <img src="assets/images/distanciamento-social.png">
            <h1>DISTANCIE-SE</h1>

        </div>
